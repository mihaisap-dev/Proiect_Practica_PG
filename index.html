<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>P&G Quality Control</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #003da5; color: white; border: none; cursor: pointer; font-weight: bold; }
        #rezultat { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Control Calitate</h2>
        <input type="text" id="prodId" placeholder="ID Produs (ex: 88823141)">
        <input type="text" id="masterName" placeholder="Master Name (ex: CM-10001)">
        <select id="charName">
            <option value="Volume">Volum</option>
            <option value="pH">pH</option>
            <option value="Viscosity">Viscozitate</option>
        </select>
        <input type="number" id="valoare" placeholder="Valoare masurata">
        
        <button onclick="valideaza()">Verifica Produsul</button>

        <div id="rezultat"></div>
    </div>

    <script>
        async function valideaza() {
            const resDiv = document.getElementById('rezultat');
            const data = {
                identifier_name: document.getElementById('prodId').value,
                master_name: document.getElementById('masterName').value,
                characteristic_name: document.getElementById('charName').value,
                measured_value: parseFloat(document.getElementById('valoare').value)
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/validate-quality', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-username': 'admin_pg' 
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                resDiv.style.display = 'block';
                
                if (response.status === 200) {
                    resDiv.className = result.decizie === 'ACCEPTAT' ? 'success' : 'error';
                    resDiv.innerHTML = `<strong>${result.decizie}</strong>: ${result.detalii}`;
                } else {
                    resDiv.className = 'error';
                    resDiv.innerText = "Eroare: " + (result.detail || "Verifica datele");
                }
            } catch (err) {
                alert("Asigura-te ca API-ul (main.py) este pornit!");
            }
        }
    </script>
</body>
</html>
